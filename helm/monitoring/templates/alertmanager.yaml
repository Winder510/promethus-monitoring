apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: {{ .Release.Namespace }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: default
    receivers:
      - name: default
        email_configs:
          - to: {{ .Values.alertmanager.emailTo | quote }}
            from: {{ .Values.alertmanager.emailFrom | quote }}
            smarthost: {{ .Values.alertmanager.smarthost | quote }}
            auth_username: {{ .Values.alertmanager.authUsername | quote }}
            auth_password_file: /etc/alertmanager/secrets/SMTP_PASSWORD
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: {{ .Values.alertmanager.image }}
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: auth
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
            items:
              - key: alertmanager.yml
                path: alertmanager.yml
        - name: auth
          secret:
            secretName: alertmanager-auth
            items:
              - key: SMTP_PASSWORD
                path: SMTP_PASSWORD
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.alertmanager.loadBalancerServiceName }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
  type: LoadBalancer
