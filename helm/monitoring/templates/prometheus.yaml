apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: { { .Release.Namespace } }
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.evaluationInterval }}
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["{{ .Values.prometheus.alertingTarget }}"]
    rule_files:
      - /etc/prometheus/rules/*.yaml
    scrape_configs:
      - job_name: {{ .Values.prometheus.alertJobName }}  #Monitor server in containers
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: {{ .Values.prometheus.namespaceLabel }}
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: job
  alerts.yaml: |
    groups:
      - name: microservices
        rules:
          - alert: ServiceDown
            expr: {{ .Values.prometheus.alertExpr }}
            for: {{ .Values.prometheus.alertRuleFor }}
            labels:
              severity: critical
            annotations:
              summary: "A service is down"
              description: "One of the microservices is not being scraped by Prometheus."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: { { .Release.Namespace } }
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: { { .Values.prometheus.serviceAccountName } }
      containers:
        - name: prometheus
          image: { { .Values.prometheus.image } }
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.prometheus.retention }}"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: alerts.yaml
                path: alerts.yaml
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: { { .Values.prometheus.clusterIPServiceName } }
  namespace: { { .Release.Namespace } }
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: { { .Values.prometheus.loadBalancerServiceName } }
  namespace: { { .Release.Namespace } }
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  type: LoadBalancer
