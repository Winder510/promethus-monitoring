apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: {{ .Release.Namespace }}
  labels:
    app: order
{{ include "microservices.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.order.replicas }}
  selector:
    matchLabels:
      app: order
      component: order
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: order
        component: order
        release: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.order.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: order
          image: "{{ .Values.order.image.repository }}:{{ .Values.order.image.tag }}"
          imagePullPolicy: {{ .Values.order.image.pullPolicy }}
          env:
            - name: PORT
              value: "{{ .Values.order.port }}"
            - name: PAYMENT_URL
              value: http://payment:{{ .Values.payment.port }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
          ports:
            - containerPort: {{ .Values.order.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.order.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.order.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: {{ .Release.Namespace }}
  labels:
    app: order
{{ include "microservices.labels" . | indent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.order.port }}"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: order
    component: order
    release: {{ .Release.Name }}
  type: {{ .Values.order.service.type }}
  ports:
    - name: http
      port: {{ .Values.order.port }}
      targetPort: {{ .Values.order.port }}
---
